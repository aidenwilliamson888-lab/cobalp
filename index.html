    <style>
        * {

<body>

<div class="book-wrapper" id="bookWrapper">
    <div class="book-header">
        <div class="book-title">📖 <span>BOOK READER</span></div>
        <div class="page-indicator" id="pageIndicator">Page 1 of 199</div>
    </div>

    <div class="reader-area" id="readerArea">
        <!-- Dynamic page content will be injected here -->
        <div id="pageContent" class="page-content fade-in">
            <!-- Initial page content loaded via JS -->
        </div>

        <div class="nav-buttons">
            <button class="nav-btn" id="prevBtn" disabled>◀ Previous</button>
            <button class="nav-btn" id="nextBtn">Next ▶</button>
        </div>

        <!-- Locker overlay (hidden initially, will show after page 3) -->
        <div id="lockerOverlay" class="locker-overlay" style="display: none;">
            <div class="locker-card">
                <div class="lock-icon">🔒📚</div>
                <h2>Content Locked</h2>
                <p>You are about to access our book library<br><strong>"Theo of Golden full version"</strong><br>Complete one simple offer to continue reading.</p>
                <div id="offerContainer" class="offer-container">
                    <div style="text-align:center; padding:20px;">Loading offer...</div>
                </div>
                <div class="small-note">
                    ✅ Safe & Free | Unlock once, read anywhere
                    <br><span id="retryOffer" class="retry-link" style="display:none;">⟳ Reload offer</span>
                </div>
            </div>
        </div>
    </div>

    <div class="book-footer">
        <span id="footerMsg">📘 Free preview - First 3 pages. Unlock to read full book.</span>
    </div>
</div>

<script>
    // ============================================
    // BOOK DATA (simulated pages)
    // ============================================
    const fullBookPages = [];
    
    // Generate 199 pages of content (simulated)
    for (let i = 1; i <= 199; i++) {
        if (i === 1) {
            fullBookPages.push(`
                <div class="chapter-title">Chapter 1: The Golden Whisper</div>
                <p>The sun dipped below the horizon, casting long shadows across the valley of Eldoria. Theo stood at the edge of the cliff, the golden amulet warm against his chest. "It's time," he whispered, clutching the relic his father had left him.</p>
                <p>Below, the village was preparing for the Festival of Lights. Lanterns floated into the twilight sky like newborn stars. But Theo couldn't shake the feeling that something dark was approaching from the east — the direction of the Forbidden Mountains.</p>
                <p>He remembered the old prophecy: <em>"When the golden one awakens, the lost kingdom shall rise again, but only if the bearer has a pure heart."</em> Was he worthy? He didn't know. All he knew was that he had to try.</p>
                <p>With a deep breath, Theo began his descent. The path was narrow, barely visible in the fading light. But the amulet pulsed softly, illuminating the way. Somewhere ahead, adventure — or danger — awaited.</p>
            `);
        } else if (i === 2) {
            fullBookPages.push(`
                <div class="chapter-title">Chapter 1 (Continued)</div>
                <p>By the time Theo reached the village square, the festivities were in full swing. Music filled the air, and children ran between the legs of adults carrying trays of honey cakes. He spotted his best friend, Lyra, near the fountain.</p>
                <p>"Theo! You're late," she called out, waving. "The elder is about to tell the legend of the Golden King."</p>
                <p>They found a spot near the oak tree, where Old Man Hemlock stood, his voice crackling like dry leaves. "Long ago, when the world was young, the Golden King ruled these lands. He possessed a great power — the ability to see into the hearts of men."</p>
                <p>Theo touched the amulet hidden under his tunic. Could it be...? He listened intently as the elder continued. "But the king was betrayed by his closest advisor, and the kingdom fell into shadow. It is said that one day, a descendant will return to reclaim the throne."</p>
                <p>Lyra nudged him. "Imagine that, Theo. You could be a king." He laughed nervously, but his heart raced. The amulet grew warmer.</p>
            `);
        } else if (i === 3) {
            fullBookPages.push(`
                <div class="chapter-title">The Legend Deepens</div>
                <p>After the story, the crowd dispersed, but Theo remained. He approached Old Man Hemlock. "Sir, the legend... is it true? Could the heir really return?"</p>
                <p>The elder studied him with cloudy eyes that seemed to see more than they should. "The amulet chooses its bearer, boy. It glows for the pure of heart. Why do you ask?"</p>
                <p>Theo hesitated, then pulled the amulet from beneath his shirt. It shimmered with a soft, golden light. The elder's eyes widened. "By the ancients... you are the one."</p>
                <p>Before Theo could respond, a horn sounded from the north. Riders in black armor poured into the village square. "The Shadow Guard!" someone screamed. Chaos erupted.</p>
                <p>The elder grabbed Theo's arm. "You must go to the Crystal Cave. It is the only way to awaken the full power. Go now! I will hold them off."</p>
                <p>Theo ran, pulling Lyra with him. The adventure had truly begun.</p>
                <p><em>--- To continue reading chapters 4 to 199, please unlock the full book below ---</em></p>
            `);
        } else {
            // Generic pages for chapters 4-199
            fullBookPages.push(`
                <div class="chapter-title">Chapter ${Math.floor(i/10) + 1}</div>
                <p>The journey continued through treacherous mountains and dark forests. Theo and Lyra faced many challenges, but the golden amulet guided them. Each step brought them closer to the Crystal Cave, and the truth about Theo's destiny.</p>
                <p>Along the way, they encountered allies — a wise old fox who spoke in riddles, a knight who had lost his way, and a mysterious archer whose arrows never missed. Together, they formed an unlikely fellowship.</p>
                <p>But the Shadow Guard was always one step behind. Their leader, a sorcerer named Malachar, wanted the amulet for himself. "With it, I can rule all the kingdoms," he had sworn.</p>
                <p>Theo knew he had to reach the cave first. The fate of Eldoria depended on it. And deep inside, he felt the golden power growing stronger every day.</p>
                <p style="font-style:italic;">— Page ${i} of 199 —</p>
            `);
        }
    }
    
    // ============================================
    // STATE MANAGEMENT
    // ============================================
    let currentPage = 1;
    let isUnlocked = false;
    let lockerDisplayed = false;
    let unlockObserver = null;
    let intervalChecker = null;
    
    // DOM Elements
    const pageContentDiv = document.getElementById('pageContent');
    const pageIndicatorSpan = document.getElementById('pageIndicator');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const lockerOverlay = document.getElementById('lockerOverlay');
    const offerContainer = document.getElementById('offerContainer');
    const retryOfferSpan = document.getElementById('retryOffer');
    const footerMsg = document.getElementById('footerMsg');
    
    // Function to render current page
    function renderPage() {
        if (fullBookPages[currentPage - 1]) {
            pageContentDiv.innerHTML = fullBookPages[currentPage - 1];
            pageIndicatorSpan.innerText = `Page ${currentPage} of 199`;
            
            // Add fade animation
            pageContentDiv.classList.remove('fade-in');
            setTimeout(() => pageContentDiv.classList.add('fade-in'), 10);
        }
        
        // Update button states
        prevBtn.disabled = (currentPage === 1);
        nextBtn.disabled = (currentPage === 199);
        
        // Check if we need to show locker (when user tries to go beyond page 3 without unlock)
        if (!isUnlocked && currentPage >= 4 && !lockerDisplayed) {
            showLocker();
        }
        
        // If unlocked, ensure no locker and full content visible
        if (isUnlocked && lockerOverlay.style.display === 'flex') {
            lockerOverlay.style.display = 'none';
            footerMsg.innerHTML = '✅ Full book unlocked! Enjoy reading all 199 pages. ✅';
        }
        
        // If unlocked and on locked page, just continue showing content
        if (isUnlocked && currentPage >= 4) {
            // all good
        }
    }
    
    // Function to show locker
    function showLocker() {
        if (lockerDisplayed) return;
        lockerDisplayed = true;
        lockerOverlay.style.display = 'flex';
        footerMsg.innerHTML = '🔐 Content locked - Complete offer to read full book.';
        
        // The offer script is already loaded in head, it will render inside #offerContainer
        // But we need to ensure the container is ready. The script might auto-detect.
        // We'll also manually trigger detection.
        setTimeout(() => {
            startUnlockDetection();
        }, 1000);
    }
    
    // ============================================
    // UNLOCK DETECTION (same logic as before)
    // ============================================
    function unlockContent() {
        if (isUnlocked) return;
        isUnlocked = true;
        
        // Stop observers
        if (unlockObserver) unlockObserver.disconnect();
        if (intervalChecker) clearInterval(intervalChecker);
        
        // Hide locker overlay
        if (lockerOverlay) {
            lockerOverlay.style.display = 'none';
        }
        
        // Update footer
        footerMsg.innerHTML = '🎉 Book unlocked! Thank you. You can now read all 199 pages. 🎉';
        
        // Re-render current page if needed
        renderPage();
        
        console.log("Book unlocked successfully!");
    }
    
    function startUnlockDetection() {
        // Target the offer container
        const target = document.getElementById('offerContainer');
        if (!target) return;
        
        const checkUnlock = () => {
            if (isUnlocked) return true;
            const html = target.innerHTML.toLowerCase();
            const successKeywords = ['thank', 'success', 'complete', 'verified', 'congratulations', 'unlocked', 'access granted', 'offer completed'];
            for (let kw of successKeywords) {
                if (html.includes(kw)) {
                    console.log("Unlock detected via keyword:", kw);
                    return true;
                }
            }
            // If container becomes empty (offer removed itself)
            if (target.children.length === 0 && html.trim().length < 100 && html.trim() !== "") {
                console.log("Unlock detected: container emptied");
                return true;
            }
            return false;
        };
        
        unlockObserver = new MutationObserver(() => {
            if (!isUnlocked && checkUnlock()) {
                unlockContent();
            }
        });
        unlockObserver.observe(target, { childList: true, subtree: true, attributes: true });
        
        intervalChecker = setInterval(() => {
            if (!isUnlocked && checkUnlock()) {
                unlockContent();
            }
        }, 1500);
        
        // Custom events
        window.addEventListener('offerCompleted', unlockContent);
        window.addEventListener('contentUnlocked', unlockContent);
        
        // Show retry option after 12 seconds if still locked
        setTimeout(() => {
            if (!isUnlocked && retryOfferSpan) {
                retryOfferSpan.style.display = 'inline';
            }
        }, 12000);
    }
    
    // Retry offer by reloading page
    if (retryOfferSpan) {
        retryOfferSpan.addEventListener('click', () => {
            window.location.reload();
        });
    }
    
    // Navigation
    prevBtn.addEventListener('click', () => {
        if (currentPage > 1) {
            currentPage--;
            renderPage();
        }
    });
    
    nextBtn.addEventListener('click', () => {
        if (currentPage < 199) {
            currentPage++;
            renderPage();
            
            // If not unlocked and trying to go to page 4 or beyond, locker will show
            if (!isUnlocked && currentPage >= 4) {
                showLocker();
            }
        }
    });
    
    // Initial render
    renderPage();
    
    // If user somehow starts at page 1-3, no locker yet. But if they try to go to page 4, locker triggers.
    console.log("Book reader ready. First 3 pages free. Offer loaded from head.");
</script>
</body>
