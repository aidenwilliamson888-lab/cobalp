<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Reader</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #1e1e1e;
    overflow: hidden;
}

/* TOP BAR */
.topbar {
    height: 50px;
    background: #2b2b2b;
    color: #fff;
    display: flex;
    align-items: center;
    padding: 0 20px;
    font-weight: bold;
}

/* LAYOUT */
.reader {
    display: flex;
    height: calc(100vh - 50px);
}

/* SIDEBAR */
.sidebar {
    width: 90px;
    background: #2a2a2a;
    padding: 10px;
}

.thumb {
    width: 70px;
    height: 90px;
    background: #444;
    margin-bottom: 10px;
    border-radius: 4px;
}

/* MAIN VIEW */
.main {
    flex: 1;
    background: #3a3a3a;
    position: relative;
}

/* BLUR EFFECT */
.blur {
    filter: blur(4px);
}

/* OVERLAY */
#lockerOverlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    display: flex;
    justify-content: center;
    align-items: center;

    background: rgba(0,0,0,0.7);
    z-index: 9999;
}

/* POPUP BOX */
.lockerBox {
    width: 420px;
    background: #fff;
    border-radius: 12px;
    padding: 30px;
    text-align: center;
    box-shadow: 0 15px 40px rgba(0,0,0,0.4);
    animation: fadeIn 0.3s ease;
}

.lockerBox h2 {
    margin-bottom: 10px;
}

.lockerBox p {
    color: #555;
    font-size: 14px;
}

/* BUTTON */
.btn {
    margin-top: 20px;
    background: #2d6cdf;
    color: #fff;
    padding: 14px;
    border-radius: 8px;
    width: 100%;
    border: none;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(45,108,223,0.4);
}

.btn:hover {
    background: #1f5bd3;
}

/* FOOT NOTE */
.note {
    font-size: 12px;
    color: #999;
    margin-top: 15px;
}

/* ANIMATION */
@keyframes fadeIn {
    from {
        transform: scale(0.9);
        opacity: 0;
    }
    to {
        transform: scale(1);
        opacity: 1;
    }
}
</style>
</head>

<body>

<div class="topbar">📚 BOOK READER</div>

<div class="reader blur" id="readerContent">

    <div class="sidebar">
        <div class="thumb"></div>
        <div class="thumb"></div>
        <div class="thumb"></div>
        <div class="thumb"></div>
    </div>

    <div class="main"></div>

</div>

<!-- OVERLAY LOCKER -->
<div id="lockerOverlay">
    <div class="lockerBox">
        <h2>🔒 Human Verification Required</h2>
        <p>
            To download or access this book file, you must complete one short task.
        </p>

        <p style="font-size:13px;color:#777;">
            ⚡ 1 task required &nbsp; ⏳ 2–3 minutes &nbsp; ✔ Access after completion
        </p>

        <button class="btn" onclick="unlockContent()">
            🔓 Verify & Unlock Book
        </button>

        <div class="note">
            This step is required to unlock and download the book file.
        </div>
    </div>
</div>
